  #     - "6379:6379"

  # [预留] Kafka
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:latest
  # kafka:
  #   image: confluentinc/cp-kafka:latest
  #   depends_on: [zookeeper]

  # [预留] Milvus
  # etcd:
  #   image: quay.io/coreos/etcd:v3.5.5
  # milvus:
  #   image: milvusdb/milvus:v2.4.0

volumes:
  pgdata: