# deploy/docker-compose.yml
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ai_cs
      POSTGRES_PASSWORD: ai_cs_pass
      POSTGRES_DB: ai_customer_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # [预留] Redis
  # redis:
  #   image: redis:7-alpine
